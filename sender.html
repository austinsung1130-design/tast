<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手機發送端</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f7f7f7; }
        .btn { padding: 20px 40px; font-size: 1.5rem; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn:disabled { background: #ccc; }
        #status { margin-top: 20px; color: #555; text-align: center; padding: 0 20px; }
    </style>
</head>
<body>
    <button id="startBtn" class="btn">點擊開始投影</button>
    <div id="status">正在檢查連線狀態...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const peer = new Peer();

        peer.on('open', () => {
            if (targetId) {
                status.innerText = "準備就緒，請點擊按鈕並選擇「立即開始」";
            } else {
                status.innerText = "錯誤：找不到連線 ID，請重新掃碼";
                startBtn.disabled = true;
            }
        });

        startBtn.onclick = async () => {
            try {
                // 針對三星手機優化的參數
                const constraints = {
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 20 }
                    },
                    audio: false // 三星手機務必設為 false 測試
                };

                const stream = await navigator.mediaDevices.getDisplayMedia(constraints);
                
                status.innerText = "正在傳輸畫面，請勿關閉此網頁";
                const call = peer.call(targetId, stream);
                startBtn.innerText = "投影中...";
                startBtn.disabled = true;

                stream.getVideoTracks()[0].onended = () => {
                    alert("投影已結束");
                    location.reload();
                };
            } catch (err) {
                console.error(err);
                // 詳細報錯，幫助我們判斷問題
                alert("啟動失敗！\n錯誤名稱：" + err.name + "\n訊息：" + err.message);
            }
        };
    </script>
</body>
</html>
