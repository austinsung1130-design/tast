<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發送端 - 手機投影</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f4f4f9; }
        button { padding: 20px 40px; font-size: 1.5rem; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        button:disabled { background: #ccc; }
        #info { margin-top: 20px; color: #666; }
    </style>
</head>
<body>

    <button id="startBtn">點擊開始投影</button>
    <div id="info">等待掃描...</div>

    <script>
        const peer = new Peer();
        const startBtn = document.getElementById('startBtn');
        const infoEl = document.getElementById('info');

        // 從網址獲取接收端的 ID
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');

        if (targetId) {
            infoEl.innerText = "已偵測到目標螢幕: " + targetId;
        } else {
            infoEl.innerText = "錯誤：找不到目標 ID，請重新掃碼";
            startBtn.disabled = true;
        }

        startBtn.onclick = async () => {
            try {
                // 1. 請求螢幕擷取權限
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });

                // 2. 撥打給接收端
                const call = peer.call(targetId, stream);
                infoEl.innerText = "連線成功！正在投影中...";
                startBtn.innerText = "投影中";
                startBtn.disabled = true;

                // 處理停止共享
                stream.getVideoTracks()[0].onended = () => {
                    location.reload(); 
                };

            } catch (err) {
                console.error("無法開啟螢幕分享:", err);
                alert("請確保使用 HTTPS 環境或 localhost，並給予螢幕錄製權限。");
            }
        };
    </script>
</body>
</html>
