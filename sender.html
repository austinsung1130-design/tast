<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發送端 - 螢幕分享</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; background: #f4f4f9; }
        button { padding: 20px 40px; font-size: 1.5rem; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:active { background: #0056b3; }
        #msg { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <button id="shareBtn">開始分享螢幕</button>
    <div id="msg">等待連接...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const peer = new Peer();
        const shareBtn = document.getElementById('shareBtn');
        const msg = document.getElementById('msg');

        peer.on('open', () => {
            if (targetId) msg.innerText = "已就緒，隨時可以分享";
        });

        shareBtn.onclick = async () => {
            try {
                // 核心 API：請求螢幕串流
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: true,
                    audio: false
                });

                msg.innerText = "正在連線到大螢幕...";
                const call = peer.call(targetId, stream);
                
                shareBtn.innerText = "投影中";
                shareBtn.disabled = true;

                // 監聽停止分享
                stream.getVideoTracks()[0].onended = () => {
                    location.reload();
                };
            } catch (err) {
                alert("無法啟動分享: " + err.message);
            }
        };
    </script>
</body>
</html>
