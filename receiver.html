<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>接收端 - 螢幕顯示</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #qrcode { padding: 10px; background: #fff; border-radius: 5px; }
        video { width: 100%; height: 100%; object-fit: contain; display: none; }
        .status { margin-bottom: 20px; font-size: 1.2rem; color: #00ffcc; }
    </style>
</head>
<body>
    <div id="status" class="status">正在建立通訊通道...</div>
    <div id="qrcode"></div>
    <video id="remoteVideo" autoplay playsinline></video>

    <script>
        const peer = new Peer();
        const status = document.getElementById('status');
        const qrcodeEl = document.getElementById('qrcode');
        const videoEl = document.getElementById('remoteVideo');

        peer.on('open', (id) => {
            status.innerText = "請掃描下方 QR Code 開始投影";
            const path = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
            const url = `${window.location.origin}${path}/sender.html?id=${id}`;
            
            new QRCode(qrcodeEl, { text: url, width: 256, height: 256 });
        });

        peer.on('call', (call) => {
            status.innerText = "投影中...";
            call.answer();
            call.on('stream', (stream) => {
                qrcodeEl.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.srcObject = stream;
            });
        });
    </script>
</body>
</html>
